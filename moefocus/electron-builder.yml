appId: com.moefocus.app
productName: MoeFocus
directories:
  output: dist
  buildResources: resources
files:
  - out/**/*
  - electron/database/schema.sql
  - wallpapers/**/*
  - diary-pictures/**/*
win:
  signAndEditExecutable: false
  target:
    - target: nsis
      arch: [x64]
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
